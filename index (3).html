<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編織工作室管理系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --s0:#f5f5f3;--s1:#efefec;--s2:#fff;
  --tp:#1a1a18;--ts:#5f5e5a;--tm:#888780;
  --bd:rgba(0,0,0,0.1);
  --ac:#2563eb;--acb:#eff6ff;--acbr:#bfdbfe;--act:#1d4ed8;
  --su:#16a34a;--sub:#f0fdf4;--sut:#15803d;
  --pr:#7c3aed;--prb:#f5f3ff;--prt:#6d28d9;
  --pk:#db2777;--pkb:#fdf2f8;--pkbr:#fbcfe8;--pkt:#be185d;
  --or:#ea580c;--orb:#fff7ed;--orbr:#fed7aa;--ort:#c2410c;
  --r:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--s0);color:var(--tp);font-size:15px;min-height:100vh}
.hdr{background:var(--s2);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.hdr-icon{width:32px;height:32px;background:var(--acb);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ac);font-size:18px}
.hdr h1{font-size:15px;font-weight:700;color:var(--tp)}
.hdr .sub{font-size:11px;color:var(--tm)}
.tabs{display:flex;background:var(--s2);border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:10px 14px;font-size:12px;color:var(--tm);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
.pg{display:none;padding:14px;max-width:640px;margin:0 auto}.pg.active{display:block}
.sl{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.f{display:flex;align-items:center;gap:8px;margin-bottom:9px}.f:last-child{margin-bottom:0}
.f label{font-size:13px;color:var(--ts);min-width:76px;flex-shrink:0}
.f input,.f select,.f textarea{flex:1;font-size:13px;border:1px solid var(--bd);border-radius:var(--r);padding:0 10px;height:36px;background:#fff;color:var(--tp)}
.f textarea{height:68px;padding:8px 10px;resize:none;line-height:1.5}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--ac)}
.f .u{font-size:12px;color:var(--tm);min-width:28px;text-align:right;flex-shrink:0}
.ab{width:100%;height:36px;border:1.5px dashed var(--acbr);border-radius:var(--r);background:none;color:var(--ac);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px}
.ab:active{background:var(--acb)}
.db{width:26px;height:26px;border:none;border-radius:var(--r);background:none;cursor:pointer;color:var(--tm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.db:active{background:#fee2e2;color:#dc2626}
/* yarn */
.yc{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.yt{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.yb{font-size:12px;color:var(--act);background:var(--acb);padding:2px 8px;border-radius:99px;border:1px solid var(--acbr)}
/* used */
.ur{display:flex;align-items:center;gap:6px;background:var(--s1);border-radius:var(--r);padding:7px 9px;margin-bottom:5px}
.ur select{flex:1;height:32px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r);padding:0 6px;background:#fff;color:var(--tp)}
.ur input{width:56px;height:32px;font-size:13px;border:1px solid var(--bd);border-radius:var(--r);padding:0 6px;background:#fff}
.ur .uu{font-size:10px;color:var(--tm);flex-shrink:0}
.ur .uc{font-size:12px;color:var(--act);font-weight:700;min-width:44px;text-align:right;flex-shrink:0}
/* gift */
.gs{background:var(--pkb);border:1px solid var(--pkbr);border-radius:12px;padding:12px 14px;margin-bottom:10px}
/* breakdown */
.bk{background:var(--s1);border-radius:var(--r);padding:11px 13px;margin-bottom:10px}
.br{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--bd)}
.br:last-child{border-bottom:none;font-weight:700;font-size:14px;padding-top:8px}
.br .bl{color:var(--ts)}.br .bv{color:var(--tp)}
.br.hi .bv{color:var(--sut)}.br.gr .bl,.br.gr .bv{color:var(--pkt)}.br.tot .bv{color:var(--act)}
/* ai */
.aib{background:#faf5ff;border:1px solid #ddd6fe;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ail{font-size:12px;color:var(--prt);font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:9px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--pr);animation:pulse 1s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.ph{background:var(--acb);border:1px solid var(--acbr);border-radius:12px;padding:16px;text-align:center;margin-bottom:10px}
.ph-p{font-size:36px;font-weight:700;color:var(--act)}
.ph-e{font-size:13px;color:var(--sut);margin-top:4px;font-weight:600}
/* buttons */
.btn-p{width:100%;height:40px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:13px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-p:active{opacity:.85}
.btn-s{width:100%;height:40px;background:var(--s1);color:var(--tp);border:1px solid var(--bd);border-radius:var(--r);font-size:13px;cursor:pointer;font-weight:500;margin-top:8px}
/* profit slider */
.pr-row{display:flex;align-items:center;gap:10px}
.pr-row label{font-size:13px;color:var(--ts);min-width:76px;flex-shrink:0}
.pr-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--acbr);border-radius:2px;outline:none}
.pr-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);cursor:pointer}
.pv{font-size:13px;font-weight:700;color:var(--act);min-width:32px}
/* type tags */
.tt{font-size:12px;padding:3px 9px;border-radius:99px;border:1px solid var(--bd);background:var(--s1);color:var(--ts);cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.tt.on{border-color:var(--acbr);background:var(--acb);color:var(--act);font-weight:600}
/* customer */
.cc{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.cc:hover{border-color:var(--acbr)}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start}
.cc-name{font-size:14px;font-weight:700;color:var(--tp)}
.cc-meta{font-size:12px;color:var(--tm);margin-top:2px}
.cc-earn{font-size:16px;font-weight:700;color:var(--act);text-align:right}
.cc-orders{font-size:11px;color:var(--tm);text-align:right}
/* order */
.oc{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start}
.o-name{font-size:14px;font-weight:600;color:var(--tp)}
.o-meta{font-size:12px;color:var(--tm);margin-top:2px;line-height:1.5}
.o-price{font-size:17px;font-weight:700;color:var(--act);text-align:right}
.o-earn{font-size:11px;color:var(--sut);text-align:right}
.status{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;display:inline-block;margin-top:3px}
.s-prep{background:#fef9c3;color:#854d0e}
.s-ship{background:var(--acb);color:var(--act)}
.s-done{background:var(--sub);color:var(--sut)}
.s-btn{padding:4px 10px;font-size:11px;border:1px solid var(--bd);border-radius:var(--r);background:var(--s1);color:var(--ts);cursor:pointer;font-weight:500}
.s-btn:active{background:var(--acb);border-color:var(--acbr);color:var(--act)}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--s2);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{width:28px;height:28px;border:none;background:var(--s1);border-radius:50%;cursor:pointer;font-size:18px;color:var(--ts);display:flex;align-items:center;justify-content:center}
/* report */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px}
.stat-label{font-size:11px;color:var(--tm);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700;color:var(--tp)}
.stat-val.ac{color:var(--act)}.stat-val.su{color:var(--sut)}.stat-val.or{color:var(--ort)}
.order-item-mini{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.order-item-mini:last-child{border-bottom:none}
/* empty */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tm);font-size:13px;line-height:2}
.sec{margin-bottom:14px}
.hint{font-size:12px;color:var(--tm);background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);padding:6px 10px;margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon"><i class="ti ti-scissors"></i></div>
  <div><h1>編織工作室</h1><div class="sub" id="pending-badge">載入中...</div></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="go('yarns')"><i class="ti ti-package"></i> 材料庫</button>
  <button class="tab" onclick="go('calc')"><i class="ti ti-sparkles"></i> AI 定價</button>
  <button class="tab" onclick="go('orders')"><i class="ti ti-clipboard-list"></i> 訂單客人</button>
  <button class="tab" onclick="go('report')"><i class="ti ti-chart-bar"></i> 月報表</button>
</div>

<!-- 材料庫 -->
<div id="pg-yarns" class="pg active">
  <p style="font-size:13px;color:var(--ts);margin-bottom:12px;line-height:1.6">先把買過的毛線登記進來，系統自動算每綑成本。</p>
  <div id="yarn-list"></div>
  <button class="ab" onclick="addYarn()"><i class="ti ti-plus"></i> 新增材料</button>
</div>

<!-- AI 定價 -->
<div id="pg-calc" class="pg">
  <div class="sec">
    <div class="sl">作品資訊</div>
    <div class="card">
      <div class="f"><label>作品名稱</label><input id="c-name" type="text" placeholder="例：奶油色手提包"></div>
      <div class="f" style="align-items:flex-start">
        <label style="padding-top:6px">類型</label>
        <div style="flex:1">
          <div style="display:flex;gap:6px">
            <input id="c-type-input" type="text" style="flex:1;font-size:13px;border:1px solid var(--bd);border-radius:var(--r);padding:0 10px;height:36px;background:#fff;color:var(--tp)" placeholder="輸入類型後按 Enter" onkeydown="if(event.key==='Enter')addTypeTag()">
            <button style="height:36px;padding:0 13px;border:1px solid var(--acbr);border-radius:var(--r);background:var(--acb);color:var(--act);font-size:15px;cursor:pointer;flex-shrink:0" onclick="addTypeTag()">＋</button>
          </div>
          <div id="type-tags-wrap" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px"></div>
          <div class="hint">💡 任何類型都可以，AI 自動識別</div>
        </div>
      </div>
      <div class="f" style="align-items:flex-start"><label style="padding-top:8px">描述</label><textarea id="c-desc" placeholder="例：鉤針編織，粗棉線，附拉鍊，約 A4 大小。"></textarea></div>
    </div>
  </div>
  <div class="sec">
    <div class="sl">使用材料</div>
    <div id="used-list"></div>
    <button class="ab" onclick="addUsed()"><i class="ti ti-plus"></i> 加入材料</button>
  </div>
  <div class="sec" style="margin-top:12px">
    <div class="sl">工時與雜費</div>
    <div class="card">
      <div class="f"><label>編織時間</label><input id="c-hours" type="number" min="0" step="0.5" value="4" oninput="recalc()"><span class="u">小時</span></div>
      <div class="f"><label>時薪</label><input id="c-hourly" type="number" min="0" step="10" value="80" oninput="recalc()"><span class="u">元/時</span></div>
      <div class="f"><label>包材/雜費</label><input id="c-misc" type="number" min="0" step="5" value="20" oninput="recalc()"><span class="u">元</span></div>
    </div>
  </div>
  <!-- 小禮物 -->
  <div class="sec">
    <div class="sl">附贈小禮物</div>
    <div class="gs">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:var(--pkt);display:flex;align-items:center;gap:5px"><i class="ti ti-gift"></i> 這個作品附贈小禮物嗎？</div>
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer">
          <input type="checkbox" id="gift-toggle" onchange="toggleGifts()" style="width:16px;height:16px;accent-color:var(--pk)">
          <span id="gift-toggle-label" style="font-size:13px;color:var(--pkt);font-weight:600">不附贈</span>
        </label>
      </div>
      <div id="gift-list" style="display:none">
        <div id="gift-items"></div>
        <button onclick="addGift()" style="width:100%;height:34px;border:1.5px dashed var(--pkbr);border-radius:var(--r);background:none;color:var(--pkt);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px"><i class="ti ti-plus"></i> 新增禮物品項</button>
      </div>
    </div>
  </div>
  <div class="sec">
    <div class="sl">利潤設定</div>
    <div class="card">
      <div class="pr-row"><label>利潤比例</label><input type="range" id="c-profit" min="5" max="80" step="5" value="20" oninput="updateProfit();recalc()"><span class="pv" id="profit-display">20%</span></div>
    </div>
  </div>
  <div class="bk">
    <div class="br"><span class="bl">材料成本</span><span class="bv" id="b-mat">$0</span></div>
    <div class="br"><span class="bl">工時費用</span><span class="bv" id="b-labor">$0</span></div>
    <div class="br"><span class="bl">其他費用</span><span class="bv" id="b-misc2">$0</span></div>
    <div class="br gr" id="b-gift-row" style="display:none"><span class="bl"><i class="ti ti-gift" style="font-size:12px"></i> 小禮物成本</span><span class="bv" id="b-gift">$0</span></div>
    <div class="br hi"><span class="bl">利潤（<span id="b-pct">20</span>%）</span><span class="bv" id="b-profit">$0</span></div>
    <div class="br tot"><span class="bl">基本建議售價</span><span class="bv" id="b-total">$0</span></div>
  </div>
  <button class="btn-s" style="background:var(--prb);border-color:#ddd6fe;color:var(--prt);font-weight:700;margin-top:0;margin-bottom:10px" onclick="runAI()"><i class="ti ti-sparkles"></i> 讓 AI 評估市場定價</button>
  <div class="aib" id="ai-box" style="display:none">
    <div class="ail"><i class="ti ti-robot"></i> AI 定價分析</div>
    <div id="ai-content"></div>
  </div>
  <div class="ph" id="price-hero" style="display:none">
    <div style="font-size:12px;color:var(--act);margin-bottom:3px">AI 建議售價</div>
    <div class="ph-p" id="ph-price">$0</div>
    <div class="ph-e" id="ph-earn"></div>
    <div id="ph-gift-note" style="font-size:11px;color:var(--pkt);margin-top:3px"></div>
  </div>
  <button class="btn-p" id="save-btn" onclick="saveRecord()"><i class="ti ti-device-floppy"></i> 儲存作品定價</button>
  <div style="margin-top:8px;font-size:12px;color:var(--tm);text-align:center">儲存後可在「訂單客人」頁面快速建立訂單</div>
</div>

<!-- 訂單客人 -->
<div id="pg-orders" class="pg">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="tab" style="border:1px solid var(--bd);border-radius:var(--r);padding:6px 14px;background:var(--s2)" id="o-tab-orders" onclick="switchOrderTab('orders')">訂單</button>
    <button class="tab" style="border:1px solid var(--bd);border-radius:var(--r);padding:6px 14px;background:var(--s2)" id="o-tab-customers" onclick="switchOrderTab('customers')">客人</button>
  </div>
  <!-- 訂單列表 -->
  <div id="o-orders">
    <div style="display:flex;gap:8px;margin-bottom:10px;overflow-x:auto">
      <button class="s-btn" id="sf-all" onclick="setStatusFilter('all')">全部</button>
      <button class="s-btn" id="sf-prep" onclick="setStatusFilter('prep')"><i class="ti ti-clock"></i> 備貨中</button>
      <button class="s-btn" id="sf-ship" onclick="setStatusFilter('ship')"><i class="ti ti-truck"></i> 出貨中</button>
      <button class="s-btn" id="sf-done" onclick="setStatusFilter('done')"><i class="ti ti-check"></i> 已完成</button>
    </div>
    <div id="order-list"></div>
    <button class="ab" onclick="openNewOrderModal()"><i class="ti ti-plus"></i> 新增訂單</button>
  </div>
  <!-- 客人列表 -->
  <div id="o-customers" style="display:none">
    <div id="customer-list"></div>
    <button class="ab" onclick="openNewCustomerModal()"><i class="ti ti-plus"></i> 新增客人</button>
  </div>
</div>

<!-- 月報表 -->
<div id="pg-report" class="pg">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <button onclick="changeMonth(-1)" style="width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--r);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left"></i></button>
    <div style="flex:1;text-align:center;font-size:15px;font-weight:700" id="report-month-label"></div>
    <button onclick="changeMonth(1)" style="width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--r);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-label">本月營收</div><div class="stat-val ac" id="r-revenue">$0</div></div>
    <div class="stat"><div class="stat-label">本月利潤</div><div class="stat-val su" id="r-profit">$0</div></div>
    <div class="stat"><div class="stat-label">完成訂單</div><div class="stat-val" id="r-orders">0 筆</div></div>
    <div class="stat"><div class="stat-label">新客人</div><div class="stat-val or" id="r-customers">0 位</div></div>
  </div>
  <div class="sl">本月訂單明細</div>
  <div class="card" id="r-detail"></div>
</div>

<!-- 新增訂單 modal -->
<div id="modal-order" class="modal-bg" style="display:none" onclick="closeModal('modal-order')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">新增訂單 <button class="modal-close" onclick="closeModal('modal-order')"><i class="ti ti-x"></i></button></div>
    <div class="f"><label>客人</label>
      <select id="mo-customer">
        <option value="">選擇客人（或先新增）</option>
      </select>
    </div>
    <div class="f"><label>作品</label>
      <select id="mo-product" onchange="fillOrderPrice()">
        <option value="">選擇已定價作品</option>
      </select>
    </div>
    <div class="f"><label>客製備註</label><input id="mo-note" type="text" placeholder="例：要粉色、加長版、附提袋..."></div>
    <div class="f"><label>售價</label><input id="mo-price" type="number" min="0" step="10" placeholder="可手動修改"><span class="u">元</span></div>
    <div class="f"><label>成本</label><input id="mo-cost" type="number" min="0" step="10" placeholder="自動帶入"><span class="u">元</span></div>
    <div class="f"><label>訂單日期</label><input id="mo-date" type="date"></div>
    <div class="f"><label>狀態</label>
      <select id="mo-status">
        <option value="prep">備貨中</option>
        <option value="ship">出貨中</option>

<script>
let yarns=JSON.parse(localStorage.getItem('kw-yarns')||'[]');
let usedItems=[];
let giftItems=[];
let pricingRecords=JSON.parse(localStorage.getItem('kw-pricing')||'[]');
let customers=JSON.parse(localStorage.getItem('kw-customers')||'[]');
let orders=JSON.parse(localStorage.getItem('kw-orders')||'[]');
let typeTags=JSON.parse(localStorage.getItem('kw-types')||'["帽子","圍巾","手套","包包","托特包","衣服","背心","家居用品","小物飾品","編織杯套","提袋"]');
let activeType='';
let aiSuggestedPrice=null;
let aiSummary='';
let statusFilter='all';
let reportMonth=new Date().toISOString().slice(0,7);
let orderTabMode='orders';

function go(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['yarns','calc','orders','report'][i]===id));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  if(id==='orders'){renderOrders();renderCustomers();}
  if(id==='report') renderReport();
  if(id==='calc'){renderUsed();renderGifts();renderTypeTags();}
  updatePendingBadge();
}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function todayStr(){return new Date().toISOString().slice(0,10);}

function updatePendingBadge(){
  const prep=orders.filter(o=>o.status==='prep').length;
  const ship=orders.filter(o=>o.status==='ship').length;
  let txt='';
  if(prep>0) txt+=`備貨 ${prep} 筆`;
  if(ship>0) txt+=(txt?' · ':'')+`待出貨 ${ship} 筆`;
  document.getElementById('pending-badge').textContent=txt||'手工編織・AI智能管理';
}

// 類型標籤
function addTypeTag(){
  const input=document.getElementById('c-type-input');
  const val=input.value.trim();
  if(!val) return;
  if(!typeTags.includes(val)) typeTags.push(val);
  activeType=val;
  localStorage.setItem('kw-types',JSON.stringify(typeTags));
  input.value='';
  renderTypeTags();
}
function selectType(t){activeType=(activeType===t?'':t);renderTypeTags();}
function removeTypeTag(t,e){
  e.stopPropagation();
  typeTags=typeTags.filter(x=>x!==t);
  if(activeType===t) activeType='';
  localStorage.setItem('kw-types',JSON.stringify(typeTags));
  renderTypeTags();
}
function renderTypeTags(){
  const el=document.getElementById('type-tags-wrap');
  el.innerHTML=typeTags.map(t=>`<span class="tt ${activeType===t?'on':''}" onclick="selectType('${t}')">${t}<span onclick="removeTypeTag('${t}',event)" style="margin-left:3px;color:var(--tm)">×</span></span>`).join('');
}

// 材料庫
function saveYarns(){localStorage.setItem('kw-yarns',JSON.stringify(yarns));}
function addYarn(){yarns.push({id:Date.now(),name:'',qty:3,unit:'綑',price:200});saveYarns();renderYarns();}
function removeYarn(id){yarns=yarns.filter(y=>y.id!==id);saveYarns();renderYarns();}
function uy(id,f,v){const y=yarns.find(y=>y.id===id);if(y){y[f]=['name','unit'].includes(f)?v:+v;saveYarns();renderYarns();}}
function cpu(y){return y.qty&&y.price?y.price/y.qty:0;}
function renderYarns(){
  const el=document.getElementById('yarn-list');
  if(!yarns.length){el.innerHTML='<div class="empty"><i class="ti ti-package" style="font-size:28px;display:block;margin-bottom:6px"></i>還沒有材料<br>點下方按鈕新增</div>';return;}
  el.innerHTML=yarns.map(y=>`<div class="yc">
    <div class="yt"><div><div style="font-size:14px;font-weight:700">${y.name||'未命名'}</div><div style="font-size:11px;color:var(--tm);margin-top:2px">共 ${y.qty}${y.unit}・$${y.price}</div></div>
    <div style="display:flex;align-items:center;gap:7px"><span class="yb">每${y.unit}≈${fmt(cpu(y))}</span><button class="db" onclick="removeYarn(${y.id})"><i class="ti ti-trash"></i></button></div></div>
    <div class="f"><label>名稱</label><input type="text" value="${y.name}" placeholder="例：粗棉線-米白" onchange="uy(${y.id},'name',this.value)"></div>
    <div class="f"><label>購買數量</label><input type="number" min="0.1" step="0.1" value="${y.qty}" oninput="uy(${y.id},'qty',this.value)">
    <select style="max-width:70px;height:36px;font-size:13px;border:1px solid var(--bd);border-radius:var(--r);padding:0 5px;background:#fff;flex:none" onchange="uy(${y.id},'unit',this.value)">${['綑','球','克','公尺','個','條'].map(u=>`<option ${y.unit===u?'selected':''}>${u}</option>`).join('')}</select></div>
    <div class="f"><label>購買總價</label><input type="number" min="0" step="10" value="${y.price}" oninput="uy(${y.id},'price',this.value)"><span class="u">元</span></div>
  </div>`).join('');
}

// 用料
function addUsed(){if(!yarns.length){alert('請先新增材料！');go('yarns');return;}usedItems.push({id:Date.now(),yarnId:yarns[0].id,qty:1});renderUsed();recalc();}
function removeUsed(id){usedItems=usedItems.filter(u=>u.id!==id);renderUsed();recalc();}
function renderUsed(){
  const el=document.getElementById('used-list');
  if(!usedItems.length){el.innerHTML='';return;}
  el.innerHTML=usedItems.map(u=>{
    const y=yarns.find(y=>y.id===u.yarnId)||yarns[0];
    const cost=y?cpu(y)*u.qty:0;
    return `<div class="ur"><select onchange="usedItems.find(u=>u.id===${u.id}).yarnId=+this.value;renderUsed();recalc()">${yarns.map(y=>`<option value="${y.id}" ${y.id===u.yarnId?'selected':''}>${y.name||'未命名'}(每${y.unit}≈${fmt(cpu(y))})</option>`).join('')}</select>
    <input type="number" min="0.1" step="0.1" value="${u.qty}" oninput="usedItems.find(u=>u.id===${u.id}).qty=+this.value;recalc()">
    <span class="uu">${y?y.unit:'綑'}</span><span class="uc">${fmt(cost)}</span>
    <button class="db" onclick="removeUsed(${u.id})"><i class="ti ti-x"></i></button></div>`;
  }).join('');
}

// 小禮物
function toggleGifts(){const on=document.getElementById('gift-toggle').checked;document.getElementById('gift-list').style.display=on?'block':'none';document.getElementById('gift-toggle-label').textContent=on?'附贈':'不附贈';recalc();}
function addGift(){giftItems.push({id:Date.now(),name:'',hours:1,hourly:60,misc:10,mats:[]});renderGifts();recalc();}
function removeGift(id){giftItems=giftItems.filter(g=>g.id!==id);renderGifts();recalc();}
function ug(id,f,v){const g=giftItems.find(g=>g.id===id);if(g){g[f]=f==='name'?v:+v;recalc();}}
function addGiftMat(gid){if(!yarns.length){alert('請先新增材料！');return;}const g=giftItems.find(g=>g.id===gid);if(g){g.mats.push({id:Date.now(),yarnId:yarns[0].id,qty:0.5});renderGifts();recalc();}}
function removeGiftMat(gid,mid){const g=giftItems.find(g=>g.id===gid);if(g){g.mats=g.mats.filter(m=>m.id!==mid);renderGifts();recalc();}}
function ugm(gid,mid,f,v){const g=giftItems.find(g=>g.id===gid);if(g){const m=g.mats.find(m=>m.id===mid);if(m){m[f]=+v;recalc();}}}
function giftCost(g){return g.mats.reduce((s,m)=>{const y=yarns.find(y=>y.id===m.yarnId);return s+(y?cpu(y)*m.qty:0);},0)+(g.hours*g.hourly)+g.misc;}
function renderGifts(){
  const el=document.getElementById('gift-items');
  if(!giftItems.length){el.innerHTML='';return;}
  el.innerHTML=giftItems.map(g=>`<div style="background:#fff;border:1px solid var(--pkbr);border-radius:var(--r);padding:10px 11px;margin-bottom:7px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <span style="font-size:13px;font-weight:700;color:var(--pkt)"><i class="ti ti-gift" style="font-size:12px"></i> ${g.name||'小禮物'}</span>
      <div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--pkt);background:var(--pkb);padding:2px 7px;border-radius:99px">成本 ${fmt(giftCost(g))}</span><button class="db" onclick="removeGift(${g.id})"><i class="ti ti-trash"></i></button></div>
    </div>
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><label style="font-size:12px;color:var(--ts);min-width:68px;flex-shrink:0">禮物名稱</label><input type="text" value="${g.name}" placeholder="例：小杯套、迷你小熊" style="flex:1;height:31px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r);padding:0 8px" onchange="giftItems.find(g=>g.id===${g.id}).name=this.value;renderGifts()"></div>
    <div style="font-size:11px;color:var(--pkt);font-weight:700;margin:6px 0 4px">使用材料</div>
    ${g.mats.map(m=>{const y=yarns.find(y=>y.id===m.yarnId)||yarns[0];return `<div style="display:flex;align-items:center;gap:5px;background:var(--pkb);border-radius:var(--r);padding:5px 7px;margin-bottom:4px">
      <select style="flex:1;height:28px;font-size:11px;border:1px solid var(--pkbr);border-radius:var(--r);padding:0 5px;background:#fff" onchange="ugm(${g.id},${m.id},'yarnId',this.value);renderGifts()">${yarns.map(y=>`<option value="${y.id}" ${y.id===m.yarnId?'selected':''}>${y.name||'未命名'}(每${y.unit}≈${fmt(cpu(y))})</option>`).join('')}</select>
      <input type="number" min="0.1" step="0.1" value="${m.qty}" style="width:48px;height:28px;font-size:12px;border:1px solid var(--pkbr);border-radius:var(--r);padding:0 5px;background:#fff" oninput="ugm(${g.id},${m.id},'qty',this.value);recalc()">
      <span style="font-size:10px;color:var(--tm)">${y?y.unit:'綑'}</span>
      <span style="font-size:11px;color:var(--pkt);font-weight:700;min-width:36px;text-align:right">${fmt(y?cpu(y)*m.qty:0)}</span>
      <button class="db" onclick="removeGiftMat(${g.id},${m.id})"><i class="ti ti-x"></i></button></div>`;}).join('')}
    <button onclick="addGiftMat(${g.id})" style="width:100%;height:26px;border:1px dashed var(--pkbr);border-radius:var(--r);background:none;color:var(--pkt);font-size:11px;cursor:pointer;margin-bottom:6px"><i class="ti ti-plus"></i> 加材料</button>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><label style="font-size:11px;color:var(--ts);min-width:68px;flex-shrink:0">編織時間</label><input type="number" min="0" step="0.5" value="${g.hours}" style="flex:1;height:29px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r);padding:0 7px" oninput="ug(${g.id},'hours',this.value)"><span style="font-size:10px;color:var(--tm);min-width:22px">小時</span></div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><label style="font-size:11px;color:var(--ts);min-width:68px;flex-shrink:0">時薪</label><input type="number" min="0" step="10" value="${g.hourly}" style="flex:1;height:29px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r);padding:0 7px" oninput="ug(${g.id},'hourly',this.value)"><span style="font-size:10px;color:var(--tm);min-width:22px">元/時</span></div>
    <div style="display:flex;align-items:center;gap:6px"><label style="font-size:11px;color:var(--ts);min-width:68px;flex-shrink:0">包裝費</label><input type="number" min="0" step="5" value="${g.misc}" style="flex:1;height:29px;font-size:12px;border:1px solid var(--bd);border-radius:var(--r);padding:0 7px" oninput="ug(${g.id},'misc',this.value)"><span style="font-size:10px;color:var(--tm);min-width:22px">元</span></div>
  </div>`).join('');
}

function updateProfit(){const v=document.getElementById('c-profit').value;document.getElementById('profit-display').textContent=v+'%';document.getElementById('b-pct').textContent=v;}
function getCosts(){
  const matCost=usedItems.reduce((s,u)=>{const y=yarns.find(y=>y.id===u.yarnId);return s+(y?cpu(y)*u.qty:0);},0);
  const labor=(+document.getElementById('c-hours').value||0)*(+document.getElementById('c-hourly').value||0);
  const misc=+document.getElementById('c-misc').value||0;
  const hasGift=document.getElementById('gift-toggle').checked;
  const giftTotal=hasGift?giftItems.reduce((s,g)=>s+giftCost(g),0):0;
  const total=matCost+labor+misc+giftTotal;
  const pct=+document.getElementById('c-profit').value||20;
  const profit=total*pct/100;
  return{matCost,labor,misc,giftTotal,hasGift,total,profit,price:total+profit,pct};
}
function recalc(){
  const c=getCosts();
  document.getElementById('b-mat').textContent=fmt(c.matCost);
  document.getElementById('b-labor').textContent=fmt(c.labor);
  document.getElementById('b-misc2').textContent=fmt(c.misc);
  document.getElementById('b-gift-row').style.display=c.hasGift&&c.giftTotal>0?'flex':'none';
  document.getElementById('b-gift').textContent=fmt(c.giftTotal);
  document.getElementById('b-profit').textContent=fmt(c.profit);
  document.getElementById('b-total').textContent=fmt(c.price);
  aiSuggestedPrice=null;
  document.getElementById('ai-box').style.display='none';
  document.getElementById('price-hero').style.display='none';
}

async function runAI(){
  const name=document.getElementById('c-name').value.trim()||'編織作品';
  const type=activeType||document.getElementById('c-type-input').value.trim()||'手工編織品';
  const desc=document.getElementById('c-desc').value.trim();
  const c=getCosts();
  const mats=usedItems.map(u=>{const y=yarns.find(y=>y.id===u.yarnId);return y?`${y.name||'線材'} ${u.qty}${y.unit}`:null;}).filter(Boolean).join('、');
  const giftDesc=c.hasGift&&giftItems.length?`附贈：${giftItems.map(g=>g.name||'小禮物').join('、')}（禮物成本 ${fmt(c.giftTotal)}）`:'不附贈';
  document.getElementById('ai-box').style.display='block';
  document.getElementById('price-hero').style.display='none';
  document.getElementById('ai-content').innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--tm)"><div class="dot"></div><div class="dot"></div><div class="dot"></div>AI 分析市場行情中...</div>`;
  const prompt=`你是台灣手工編織品定價專家。作品：${name}（${type}）。描述：${desc||'無'}。用料：${mats||'未詳列'}。材料成本：${Math.round(c.matCost)}元。工時：${document.getElementById('c-hours').value}小時×${document.getElementById('c-hourly').value}元=${Math.round(c.labor)}元。雜費：${Math.round(c.misc)}元。${giftDesc}。總成本：${Math.round(c.total)}元。賣家是台灣超級新手在蝦皮/小農市集販售。請用JSON格式回答（不加其他文字）：{"price":數字,"reason":"2-3句親切口語定價原因提到${type}市場行情","earn":數字,"tip":"1句新手實用提示","gift_note":"${c.hasGift&&giftItems.length?'一句附贈禮物對定價影響':''}"}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const parsed=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    aiSuggestedPrice=parsed.price;aiSummary=parsed.reason+(parsed.tip?' '+parsed.tip:'');
    document.getElementById('ai-content').innerHTML=`<div style="font-size:13px;color:var(--tp);line-height:1.7"><p style="margin-bottom:7px">💬 ${parsed.reason}</p><p style="font-size:12px;color:var(--ts)">💡 ${parsed.tip}</p>${parsed.gift_note?`<p style="font-size:12px;color:var(--pkt);margin-top:6px">🎁 ${parsed.gift_note}</p>`:''}</div>`;
    document.getElementById('price-hero').style.display='block';
    document.getElementById('ph-price').textContent=fmt(parsed.price);
    document.getElementById('ph-earn').textContent=`扣掉成本後可賺 ${fmt(parsed.earn)} 元`;
    document.getElementById('ph-gift-note').textContent=c.hasGift&&giftItems.length?`（已含 ${giftItems.length} 個禮物成本 ${fmt(c.giftTotal)}）`:'';
  }catch(e){document.getElementById('ai-content').innerHTML=`<p style="font-size:13px;color:#dc2626">分析失敗，請稍後再試。</p>`;}
}

function saveRecord(){
  const name=document.getElementById('c-name').value.trim()||'未命名作品';
  const type=activeType||'未分類';
  const c=getCosts();
  const finalPrice=aiSuggestedPrice||Math.round(c.price);
  const gifts=c.hasGift&&giftItems.length?giftItems.map(g=>g.name||'小禮物').join('、'):'';
  const rec={id:Date.now(),date:todayStr(),name,type,cost:Math.round(c.total),price:finalPrice,earn:finalPrice-Math.round(c.total),gifts,aiSummary,hasAI:!!aiSuggestedPrice};
  pricingRecords.unshift(rec);
  localStorage.setItem('kw-pricing',JSON.stringify(pricingRecords));
  const btn=document.getElementById('save-btn');
  btn.innerHTML='<i class="ti ti-circle-check"></i> 已儲存 ✓';btn.style.background='#16a34a';
  setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy"></i> 儲存作品定價';btn.style.background='';},2000);
}

// 訂單頁切換
function switchOrderTab(t){
  orderTabMode=t;
  document.getElementById('o-orders').style.display=t==='orders'?'block':'none';
  document.getElementById('o-customers').style.display=t==='customers'?'block':'none';
  document.getElementById('o-tab-orders').classList.toggle('active',t==='orders');
  document.getElementById('o-tab-customers').classList.toggle('active',t==='customers');
}

// 訂單狀態
function setStatusFilter(s){
  statusFilter=s;
  ['all','prep','ship','done'].forEach(x=>{const el=document.getElementById('sf-'+x);if(el)el.style.background=x===s?'var(--acb)':'';if(el)el.style.color=x===s?'var(--act)':'';});
  renderOrders();
}
function statusLabel(s){return s==='prep'?'備貨中':s==='ship'?'出貨中':'已完成';}
function statusClass(s){return s==='prep'?'s-prep':s==='ship'?'s-ship':'s-done';}
function nextStatus(s){return s==='prep'?'ship':s==='ship'?'done':null;}
function nextStatusLabel(s){return s==='prep'?'標記出貨':s==='ship'?'標記完成':null;}
function advanceStatus(id){
  const o=orders.find(o=>o.id===id);
  if(o&&nextStatus(o.status)){o.status=nextStatus(o.status);localStorage.setItem('kw-orders',JSON.stringify(orders));renderOrders();updatePendingBadge();}
}

function renderOrders(){
  const el=document.getElementById('order-list');
  let list=statusFilter==='all'?orders:orders.filter(o=>o.status===statusFilter);
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-clipboard-list" style="font-size:28px;display:block;margin-bottom:6px"></i>還沒有訂單</div>';return;}
  el.innerHTML=list.sort((a,b)=>b.id-a.id).map(o=>{
    const cust=customers.find(c=>c.id===o.customerId);
    const next=nextStatus(o.status);
    return `<div class="oc">
      <div class="oc-top">
        <div style="flex:1">
          <div class="o-name">${o.productName}</div>
          <div class="o-meta">${cust?'👤 '+cust.name:'無客人資訊'}${o.note?' · 📝 '+o.note:''}<br>${o.date}</div>
          <span class="status ${statusClass(o.status)}">${statusLabel(o.status)}</span>
          ${next?`<button class="s-btn" style="margin-left:6px" onclick="advanceStatus(${o.id})">${nextStatusLabel(o.status)}</button>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div class="o-price">${fmt(o.price)}</div>
          <div class="o-earn">賺 ${fmt(o.price-o.cost)}</div>
          <button class="db" style="margin-left:auto;margin-top:4px" onclick="deleteOrder(${o.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function deleteOrder(id){if(!confirm('確定刪除這筆訂單？'))return;orders=orders.filter(o=>o.id!==id);localStorage.setItem('kw-orders',JSON.stringify(orders));renderOrders();updatePendingBadge();}

function renderCustomers(){
  const el=document.getElementById('customer-list');
  if(!customers.length){el.innerHTML='<div class="empty"><i class="ti ti-users" style="font-size:28px;display:block;margin-bottom:6px"></i>還沒有客人資料</div>';return;}
  el.innerHTML=customers.map(c=>{
    const myOrders=orders.filter(o=>o.customerId===c.id&&o.status==='done');
    const totalEarn=myOrders.reduce((s,o)=>s+(o.price-o.cost),0);
    const totalRevenue=myOrders.reduce((s,o)=>s+o.price,0);
    return `<div class="cc" onclick="openCustomerDetail(${c.id})">
      <div class="cc-top">
        <div>
          <div class="cc-name">${c.name}</div>
          <div class="cc-meta">${c.phone||''}${c.social?' · '+c.social:''}${c.note?' · '+c.note:''}</div>
          <div style="font-size:11px;color:var(--tm);margin-top:2px">完成訂單 ${myOrders.length} 筆・消費 ${fmt(totalRevenue)}</div>
        </div>
        <div>
          <div class="cc-earn">${fmt(totalEarn)}</div>
          <div class="cc-orders">累計利潤</div>
          <button class="db" style="margin-left:auto;margin-top:4px" onclick="event.stopPropagation();deleteCustomer(${c.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function deleteCustomer(id){if(!confirm('確定刪除這位客人？'))return;customers=customers.filter(c=>c.id!==id);localStorage.setItem('kw-customers',JSON.stringify(customers));renderCustomers();}

function openCustomerDetail(id){
  const c=customers.find(c=>c.id===id);
  if(!c) return;
  const myOrders=orders.filter(o=>o.customerId===id);
  const done=myOrders.filter(o=>o.status==='done');
  const totalRevenue=done.reduce((s,o)=>s+o.price,0);
  const totalEarn=done.reduce((s,o)=>s+(o.price-o.cost),0);
  document.getElementById('cd-title').innerHTML=`${c.name} <button class="modal-close" onclick="closeModal('modal-cdetail')"><i class="ti ti-x"></i></button>`;
  document.getElementById('cd-content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="stat"><div class="stat-label">累計消費</div><div class="stat-val ac" style="font-size:20px">${fmt(totalRevenue)}</div></div>
      <div class="stat"><div class="stat-label">我的利潤</div><div class="stat-val su" style="font-size:20px">${fmt(totalEarn)}</div></div>
    </div>
    ${c.phone?`<div style="font-size:13px;color:var(--ts);margin-bottom:6px"><i class="ti ti-phone" style="font-size:13px"></i> ${c.phone}</div>`:''}
    ${c.social?`<div style="font-size:13px;color:var(--ts);margin-bottom:6px"><i class="ti ti-brand-instagram" style="font-size:13px"></i> ${c.social}</div>`:''}
    ${c.note?`<div style="font-size:13px;color:var(--ts);margin-bottom:14px"><i class="ti ti-note" style="font-size:13px"></i> ${c.note}</div>`:''}
    <div class="sl">訂單記錄（${myOrders.length} 筆）</div>
    ${myOrders.length?myOrders.sort((a,b)=>b.id-a.id).map(o=>`<div class="order-item-mini"><div><div>${o.productName}</div><span class="status ${statusClass(o.status)}" style="font-size:10px;padding:1px 6px">${statusLabel(o.status)}</span></div><div style="text-align:right"><div style="font-weight:700;color:var(--act)">${fmt(o.price)}</div><div style="font-size:11px;color:var(--sut)">賺 ${fmt(o.price-o.cost)}</div></div></div>`).join(''):'<div style="font-size:13px;color:var(--tm);padding:10px 0">還沒有訂單記錄</div>'}
  `;
  document.getElementById('modal-cdetail').style.display='flex';
}

// modal
function openNewOrderModal(){
  document.getElementById('mo-customer').innerHTML='<option value="">選擇客人（或先新增）</option>'+customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('mo-product').innerHTML='<option value="">選擇已定價作品</option>'+pricingRecords.map(p=>`<option value="${p.id}">${p.name}（${fmt(p.price)}）</option>`).join('');
  document.getElementById('mo-date').value=todayStr();
  document.getElementById('mo-price').value='';
  document.getElementById('mo-cost').value='';
  document.getElementById('mo-note').value='';
  document.getElementById('modal-order').style.display='flex';
}
function fillOrderPrice(){
  const id=+document.getElementById('mo-product').value;
  const p=pricingRecords.find(p=>p.id===id);
  if(p){document.getElementById('mo-price').value=p.price;document.getElementById('mo-cost').value=p.cost;}
}
function saveOrder(){
  const custId=+document.getElementById('mo-customer').value||null;
  const prodId=+document.getElementById('mo-product').value||null;
  const prod=pricingRecords.find(p=>p.id===prodId);
  const price=+document.getElementById('mo-price').value||0;
  const cost=+document.getElementById('mo-cost').value||0;
  const note=document.getElementById('mo-note').value.trim();
  const date=document.getElementById('mo-date').value||todayStr();
  const status=document.getElementById('mo-status').value;
  const productName=prod?prod.name:(document.getElementById('mo-product').options[document.getElementById('mo-product').selectedIndex]?.text||'自訂作品');
  orders.unshift({id:Date.now(),customerId:custId,productId:prodId,productName,price,cost,note,date,status});
  localStorage.setItem('kw-orders',JSON.stringify(orders));
  closeModal('modal-order');renderOrders();updatePendingBadge();
}
function openNewCustomerModal(){
  ['mc-name','mc-phone','mc-social','mc-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-customer').style.display='flex';
}
function saveCustomer(){
  const name=document.getElementById('mc-name').value.trim();
  if(!name){alert('請輸入姓名！');return;}
  customers.push({id:Date.now(),name,phone:document.getElementById('mc-phone').value.trim(),social:document.getElementById('mc-social').value.trim(),note:document.getElementById('mc-note').value.trim()});
  localStorage.setItem('kw-customers',JSON.stringify(customers));
  closeModal('modal-customer');renderCustomers();
}
function closeModal(id){document.getElementById(id).style.display='none';}

// 月報表
function changeMonth(d){
  const [y,m]=reportMonth.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  reportMonth=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  renderReport();
}
function renderReport(){
  const [y,m]=reportMonth.split('-');
  document.getElementById('report-month-label').textContent=`${y} 年 ${+m} 月`;
  const monthOrders=orders.filter(o=>o.date&&o.date.startsWith(reportMonth)&&o.status==='done');
  const allMonthOrders=orders.filter(o=>o.date&&o.date.startsWith(reportMonth));
  const revenue=monthOrders.reduce((s,o)=>s+o.price,0);
  const profit=monthOrders.reduce((s,o)=>s+(o.price-o.cost),0);
  const newCustomers=customers.filter(c=>{const firstOrder=orders.filter(o=>o.customerId===c.id).sort((a,b)=>a.id-b.id)[0];return firstOrder&&firstOrder.date&&firstOrder.date.startsWith(reportMonth);});
  document.getElementById('r-revenue').textContent=fmt(revenue);
  document.getElementById('r-profit').textContent=fmt(profit);
  document.getElementById('r-orders').textContent=monthOrders.length+' 筆';
  document.getElementById('r-customers').textContent=newCustomers.length+' 位';
  const detail=document.getElementById('r-detail');
  if(!allMonthOrders.length){detail.innerHTML='<div style="font-size:13px;color:var(--tm);text-align:center;padding:16px">本月還沒有訂單</div>';return;}
  detail.innerHTML=allMonthOrders.sort((a,b)=>b.id-a.id).map(o=>{
    const cust=customers.find(c=>c.id===o.customerId);
    return `<div class="order-item-mini">
      <div><div style="font-weight:500">${o.productName}</div><div style="font-size:11px;color:var(--tm)">${cust?cust.name+' · ':''}${o.date} <span class="status ${statusClass(o.status)}" style="font-size:10px;padding:1px 5px">${statusLabel(o.status)}</span></div></div>
      <div style="text-align:right"><div style="font-weight:700;color:var(--act)">${fmt(o.price)}</div><div style="font-size:11px;color:${o.status==='done'?'var(--sut)':'var(--tm)'}">賺 ${fmt(o.price-o.cost)}</div></div>
    </div>`;
  }).join('');
}

// init
renderYarns();renderTypeTags();recalc();
switchOrderTab('orders');
setStatusFilter('all');
updatePendingBadge();
renderReport();
</script>
