<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編織定價系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface-0:#f5f5f3;--surface-1:#efefec;--surface-2:#fff;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;
  --border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;--accent-text:#1d4ed8;
  --success:#16a34a;--success-bg:#f0fdf4;--success-text:#15803d;
  --pro:#7c3aed;--pro-bg:#f5f3ff;--pro-text:#6d28d9;
  --radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface-0);color:var(--text-primary);font-size:15px;min-height:100vh}
.header{background:var(--surface-2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.header-icon{width:32px;height:32px;background:var(--accent-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent)}
.header h1{font-size:16px;font-weight:600;color:var(--text-primary)}
.header span{font-size:12px;color:var(--text-muted);margin-left:2px}
.tabs{display:flex;background:var(--surface-2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:11px 18px;font-size:13px;color:var(--text-muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.tab:hover:not(.active){color:var(--text-primary)}
.page{display:none;padding:16px;max-width:640px;margin:0 auto}.page.active{display:block}
.sec-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.field{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:var(--text-secondary);min-width:80px;flex-shrink:0}
.field input,.field select,.field textarea{flex:1;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;height:36px;background:#fff;color:var(--text-primary);-webkit-appearance:none;appearance:none}
.field textarea{height:72px;padding:8px 10px;resize:none;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.field .unit{font-size:12px;color:var(--text-muted);min-width:30px;text-align:right;flex-shrink:0}
.add-btn{width:100%;height:38px;border:1.5px dashed var(--accent-border);border-radius:var(--radius);background:none;color:var(--accent);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px}
.add-btn:active{background:var(--accent-bg)}
.del-btn{width:28px;height:28px;border:none;border-radius:var(--radius);background:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.del-btn:active{background:#fee2e2;color:#dc2626}
.yarn-card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.yarn-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.yarn-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.yarn-badge{font-size:12px;color:var(--accent-text);background:var(--accent-bg);padding:3px 9px;border-radius:99px;border:1px solid var(--accent-border)}
.used-row{display:flex;align-items:center;gap:7px;background:var(--surface-1);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px}
.used-row select{flex:1;height:33px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);padding:0 7px;background:#fff;color:var(--text-primary)}
.used-row input{width:58px;height:33px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);padding:0 7px;background:#fff;color:var(--text-primary)}
.used-row .u-unit{font-size:11px;color:var(--text-muted);flex-shrink:0}
.used-row .u-cost{font-size:13px;color:var(--accent-text);font-weight:600;min-width:46px;text-align:right;flex-shrink:0}
.breakdown{background:var(--surface-1);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.brow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none;font-weight:600;font-size:14px;padding-top:9px}
.brow .bl{color:var(--text-secondary)}.brow .bv{color:var(--text-primary)}
.brow.hi .bv{color:var(--success-text)}
.brow.total-row .bv{color:var(--accent-text)}
.ai-btn{width:100%;height:42px;background:var(--pro-bg);border:1px solid #ddd6fe;border-radius:var(--radius);color:var(--pro-text);font-size:14px;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px}
.ai-btn:active{opacity:.8}
.ai-box{background:#faf5ff;border:1px solid #ddd6fe;border-radius:12px;padding:14px;margin-bottom:10px}
.ai-label{font-size:12px;color:var(--pro-text);font-weight:600;display:flex;align-items:center;gap:5px;margin-bottom:10px}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);padding:4px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--pro);animation:pulse 1s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.ai-result{font-size:14px;color:var(--text-primary);line-height:1.7}
.price-hero{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:12px;padding:18px;text-align:center;margin-bottom:10px}
.ph-label{font-size:13px;color:var(--accent-text);margin-bottom:4px}
.ph-price{font-size:38px;font-weight:700;color:var(--accent-text)}
.ph-earn{font-size:14px;color:var(--success-text);margin-top:5px;font-weight:500}
.save-btn{width:100%;height:42px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;cursor:pointer;font-weight:600}
.save-btn:active{opacity:.85}
.profit-row{display:flex;align-items:center;gap:10px}
.profit-row label{font-size:13px;color:var(--text-secondary);min-width:80px;flex-shrink:0}
.profit-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--accent-border);border-radius:2px;outline:none}
.profit-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer}
.profit-val{font-size:13px;font-weight:600;color:var(--accent-text);min-width:34px}
.rec-card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.rec-header{display:flex;justify-content:space-between;align-items:flex-start}
.rec-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.rec-meta{font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.5}
.rec-right{text-align:right;flex-shrink:0;margin-left:12px}
.rec-price{font-size:20px;font-weight:700;color:var(--accent-text)}
.rec-earn{font-size:12px;color:var(--success-text);font-weight:500}
.rec-ai-preview{font-size:12px;color:var(--text-secondary);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:14px;line-height:2}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.date-row input[type=date]{height:36px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;background:#fff;color:var(--text-primary)}
.date-btn{padding:7px 13px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text-secondary);cursor:pointer;font-weight:500}
.date-btn:active,.date-btn.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent-text)}
.auto-tag{font-size:11px;background:var(--success-bg);color:var(--success-text);padding:3px 8px;border-radius:99px;border:1px solid #bbf7d0;font-weight:500}
.day-group{margin-bottom:1.25rem}
.day-label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.badge{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500}
.badge-type{background:var(--accent-bg);color:var(--accent-text)}
.badge-ai{background:var(--pro-bg);color:var(--pro-text)}
.sec{margin-bottom:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon"><i class="ti ti-scissors" style="font-size:18px"></i></div>
  <h1>編織定價系統</h1>
  <span>手工編織・AI 智能定價</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('yarns')"><i class="ti ti-package"></i> 材料庫</button>
  <button class="tab" onclick="go('calc')"><i class="ti ti-sparkles"></i> AI 定價</button>
  <button class="tab" onclick="go('records')"><i class="ti ti-calendar"></i> 作品日誌</button>
</div>

<!-- 材料庫 -->
<div id="pg-yarns" class="page active">
  <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6">先把買過的毛線登記進來，系統會自動算出每綑/球的成本，之後計算作品就能直接選用。</p>
  <div id="yarn-list"></div>
  <button class="add-btn" onclick="addYarn()"><i class="ti ti-plus"></i> 新增材料</button>
</div>

<!-- AI 定價 -->
<div id="pg-calc" class="page">
  <div class="sec">
    <div class="sec-label">作品資訊</div>
    <div class="card">
      <div class="field"><label>作品名稱</label><input id="c-name" type="text" placeholder="例：奶油色手提包"></div>
      <div class="field"><label>類型</label>
        <select id="c-type">
          <option>帽子/圍巾/手套</option>
          <option>包包/托特包</option>
          <option>衣服/背心</option>
          <option>家居用品</option>
          <option>小物飾品</option>
        </select>
      </div>
      <div class="field" style="align-items:flex-start">
        <label style="padding-top:8px">描述</label>
        <textarea id="c-desc" placeholder="例：鉤針編織，用粗棉線，附拉鍊，適合日常使用，約 A4 大小。"></textarea>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">使用的材料</div>
    <div id="used-list"></div>
    <button class="add-btn" onclick="addUsed()"><i class="ti ti-plus"></i> 加入材料</button>
  </div>

  <div class="sec" style="margin-top:14px">
    <div class="sec-label">工時與雜費</div>
    <div class="card">
      <div class="field"><label>編織時間</label><input id="c-hours" type="number" min="0" step="0.5" value="4" oninput="recalc()"><span class="unit">小時</span></div>
      <div class="field"><label>時薪</label><input id="c-hourly" type="number" min="0" step="10" value="80" oninput="recalc()"><span class="unit">元/時</span></div>
      <div class="field"><label>包材/雜費</label><input id="c-misc" type="number" min="0" step="5" value="20" oninput="recalc()"><span class="unit">元</span></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">利潤設定</div>
    <div class="card">
      <div class="profit-row">
        <label>利潤比例</label>
        <input type="range" id="c-profit" min="5" max="80" step="5" value="20" oninput="updateProfit();recalc()">
        <span class="profit-val" id="profit-display">20%</span>
      </div>
    </div>
  </div>

  <div class="breakdown">
    <div class="brow"><span class="bl">材料成本</span><span class="bv" id="b-mat">$0</span></div>
    <div class="brow"><span class="bl">工時費用</span><span class="bv" id="b-labor">$0</span></div>
    <div class="brow"><span class="bl">其他費用</span><span class="bv" id="b-misc">$0</span></div>
    <div class="brow hi"><span class="bl">利潤（<span id="b-pct">20</span>%）</span><span class="bv" id="b-profit">$0</span></div>
    <div class="brow total-row"><span class="bl">基本建議售價</span><span class="bv" id="b-total">$0</span></div>
  </div>

  <button class="ai-btn" onclick="runAI()"><i class="ti ti-sparkles"></i> 讓 AI 幫我評估市場定價</button>

  <div class="ai-box" id="ai-box" style="display:none">
    <div class="ai-label"><i class="ti ti-robot"></i> AI 定價分析</div>
    <div id="ai-content"></div>
  </div>

  <div class="price-hero" id="price-hero" style="display:none">
    <div class="ph-label">AI 建議售價</div>
    <div class="ph-price" id="ph-price">$0</div>
    <div class="ph-earn" id="ph-earn"></div>
  </div>

  <button class="save-btn" id="save-btn" onclick="saveRecord()"><i class="ti ti-device-floppy"></i> 儲存到今天的日誌</button>
</div>

<!-- 作品日誌 -->
<div id="pg-records" class="page">
  <div class="date-row">
    <input type="date" id="filter-date" onchange="renderRecords()">
    <button class="date-btn" onclick="filterToday()">今天</button>
    <button class="date-btn" onclick="clearFilter()">全部</button>
    <span class="auto-tag"><i class="ti ti-circle-check" style="font-size:11px"></i> 自動存檔</span>
  </div>
  <div id="rec-list"></div>
</div>

<script>
let yarns=JSON.parse(localStorage.getItem('kp3-yarns')||'[]');
let usedItems=[];
let records=JSON.parse(localStorage.getItem('kp3-records')||'[]');
let aiSuggestedPrice=null;
let aiSummary='';

function go(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['yarns','calc','records'][i]===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  if(id==='records') renderRecords();
  if(id==='calc') renderUsed();
}

function fmt(n){return '$'+Math.round(n).toLocaleString();}
function todayStr(){return new Date().toISOString().slice(0,10);}

function saveYarns(){localStorage.setItem('kp3-yarns',JSON.stringify(yarns));}
function addYarn(){yarns.push({id:Date.now(),name:'',qty:3,unit:'綑',price:200});saveYarns();renderYarns();}
function removeYarn(id){yarns=yarns.filter(y=>y.id!==id);saveYarns();renderYarns();}
function uy(id,f,v){const y=yarns.find(y=>y.id===id);if(y){y[f]=['name','unit'].includes(f)?v:+v;saveYarns();renderYarns();}}
function cpu(y){return y.qty&&y.price?y.price/y.qty:0;}

function renderYarns(){
  const el=document.getElementById('yarn-list');
  if(!yarns.length){el.innerHTML='<div class="empty"><i class="ti ti-package" style="font-size:32px;display:block;margin-bottom:8px"></i>還沒有材料<br>點下方按鈕新增你買的毛線或輔料</div>';return;}
  el.innerHTML=yarns.map(y=>`
    <div class="yarn-card">
      <div class="yarn-top">
        <div>
          <div class="yarn-name">${y.name||'未命名材料'}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">共 ${y.qty} ${y.unit}・花了 $${y.price}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="yarn-badge">每${y.unit} ≈ ${fmt(cpu(y))}</span>
          <button class="del-btn" onclick="removeYarn(${y.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      <div class="field"><label>名稱</label><input type="text" value="${y.name}" placeholder="例：粗棉線-米白" onchange="uy(${y.id},'name',this.value)"></div>
      <div class="field">
        <label>購買數量</label>
        <input type="number" min="0.1" step="0.1" value="${y.qty}" oninput="uy(${y.id},'qty',this.value)">
        <select style="max-width:72px;height:36px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);padding:0 6px;background:#fff;color:var(--text-primary);flex:none" onchange="uy(${y.id},'unit',this.value)">
          ${['綑','球','克','公尺','個','條'].map(u=>`<option ${y.unit===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>購買總價</label><input type="number" min="0" step="10" value="${y.price}" oninput="uy(${y.id},'price',this.value)"><span class="unit">元</span></div>
    </div>`).join('');
}

function addUsed(){
  if(!yarns.length){alert('請先到「材料庫」新增毛線！');go('yarns');return;}
  usedItems.push({id:Date.now(),yarnId:yarns[0].id,qty:1});
  renderUsed();recalc();
}
function removeUsed(id){usedItems=usedItems.filter(u=>u.id!==id);renderUsed();recalc();}

function renderUsed(){
  const el=document.getElementById('used-list');
  if(!usedItems.length){el.innerHTML='';return;}
  el.innerHTML=usedItems.map(u=>{
    const y=yarns.find(y=>y.id===u.yarnId)||yarns[0];
    const cost=y?cpu(y)*u.qty:0;
    return `<div class="used-row">
      <select onchange="usedItems.find(u=>u.id===${u.id}).yarnId=+this.value;renderUsed();recalc()">
        ${yarns.map(y=>`<option value="${y.id}" ${y.id===u.yarnId?'selected':''}>${y.name||'未命名'} (每${y.unit}≈${fmt(cpu(y))})</option>`).join('')}
      </select>
      <input type="number" min="0.1" step="0.1" value="${u.qty}" oninput="usedItems.find(u=>u.id===${u.id}).qty=+this.value;recalc()">
      <span class="u-unit">${y?y.unit:'綑'}</span>
      <span class="u-cost">${fmt(cost)}</span>
      <button class="del-btn" onclick="removeUsed(${u.id})"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

function updateProfit(){
  const v=document.getElementById('c-profit').value;
  document.getElementById('profit-display').textContent=v+'%';
  document.getElementById('b-pct').textContent=v;
}

function getCosts(){
  const matCost=usedItems.reduce((s,u)=>{const y=yarns.find(y=>y.id===u.yarnId);return s+(y?cpu(y)*u.qty:0);},0);
  const labor=(+document.getElementById('c-hours').value||0)*(+document.getElementById('c-hourly').value||0);
  const misc=+document.getElementById('c-misc').value||0;
  const total=matCost+labor+misc;
  const pct=+document.getElementById('c-profit').value||20;
  const profit=total*pct/100;
  return{matCost,labor,misc,total,profit,price:total+profit,pct};
}

function recalc(){
  const c=getCosts();
  document.getElementById('b-mat').textContent=fmt(c.matCost);
  document.getElementById('b-labor').textContent=fmt(c.labor);
  document.getElementById('b-misc').textContent=fmt(c.misc);
  document.getElementById('b-profit').textContent=fmt(c.profit);
  document.getElementById('b-total').textContent=fmt(c.price);
  aiSuggestedPrice=null;
  document.getElementById('ai-box').style.display='none';
  document.getElementById('price-hero').style.display='none';
}

async function runAI(){
  const name=document.getElementById('c-name').value.trim()||'編織作品';
  const type=document.getElementById('c-type').value;
  const desc=document.getElementById('c-desc').value.trim();
  const c=getCosts();
  const mats=usedItems.map(u=>{const y=yarns.find(y=>y.id===u.yarnId);return y?`${y.name||'線材'} ${u.qty}${y.unit}（每單位成本${fmt(cpu(y))}）`:null;}).filter(Boolean).join('、');

  document.getElementById('ai-box').style.display='block';
  document.getElementById('price-hero').style.display='none';
  document.getElementById('ai-content').innerHTML=`<div class="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="font-size:13px;color:var(--text-muted)">AI 正在分析市場行情...</span></div>`;

  const prompt=`你是台灣手工編織品定價專家。根據以下資訊給出具體的市場定價建議。

作品：${name}（${type}）
描述：${desc||'無'}
用料：${mats||'未詳列'}
材料成本：${Math.round(c.matCost)} 元
工時：${document.getElementById('c-hours').value} 小時 × 時薪 ${document.getElementById('c-hourly').value} 元 = ${Math.round(c.labor)} 元
雜費：${Math.round(c.misc)} 元
總成本：${Math.round(c.total)} 元
賣家：台灣超級新手，在蝦皮/小農市集販售。

請用 JSON 格式回答（不要加其他文字）：
{"price":數字, "reason":"2-3句親切口語的定價原因", "earn":數字, "tip":"1句對新手的實用小提示"}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);
    aiSuggestedPrice=parsed.price;
    aiSummary=parsed.reason+' '+parsed.tip;

    document.getElementById('ai-content').innerHTML=`
      <div class="ai-result">
        <p style="margin-bottom:8px">💬 ${parsed.reason}</p>
        <p style="font-size:13px;color:var(--text-secondary)">💡 ${parsed.tip}</p>
      </div>`;
    document.getElementById('price-hero').style.display='block';
    document.getElementById('ph-price').textContent=fmt(parsed.price);
    document.getElementById('ph-earn').textContent=`扣掉成本後，可以賺到 ${fmt(parsed.earn)} 元`;
  }catch(e){
    document.getElementById('ai-content').innerHTML=`<div style="font-size:13px;color:#dc2626">分析失敗，請稍後再試。</div>`;
  }
}

function saveRecord(){
  const name=document.getElementById('c-name').value.trim()||'未命名作品';
  const type=document.getElementById('c-type').value;
  const c=getCosts();
  const finalPrice=aiSuggestedPrice||Math.round(c.price);
  const earn=finalPrice-Math.round(c.total);
  const mats=usedItems.map(u=>{const y=yarns.find(y=>y.id===u.yarnId);return y?`${y.name||'線材'}×${u.qty}${y.unit}`:null;}).filter(Boolean).join('、');

  records.unshift({id:Date.now(),date:todayStr(),name,type,cost:Math.round(c.total),price:finalPrice,earn,mats,aiSummary,hasAI:!!aiSuggestedPrice});
  localStorage.setItem('kp3-records',JSON.stringify(records));

  const btn=document.getElementById('save-btn');
  btn.innerHTML='<i class="ti ti-circle-check"></i> 已儲存到今天日誌 ✓';
  btn.style.background='#16a34a';
  setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy"></i> 儲存到今天的日誌';btn.style.background='';},2000);
}

function filterToday(){document.getElementById('filter-date').value=todayStr();renderRecords();}
function clearFilter(){document.getElementById('filter-date').value='';renderRecords();}

function renderRecords(){
  const el=document.getElementById('rec-list');
  const fd=document.getElementById('filter-date').value;
  let filtered=fd?records.filter(r=>r.date===fd):records;
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><i class="ti ti-calendar" style="font-size:32px;display:block;margin-bottom:8px"></i>${fd?`${fd} 這天還沒有記錄`:'還沒有任何作品記錄'}</div>`;
    return;
  }
  const byDate={};
  filtered.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  el.innerHTML=Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const items=byDate[date];
    const totalEarn=items.reduce((s,r)=>s+r.earn,0);
    return `<div class="day-group">
      <div class="day-label"><span>${date.replace(/-/g,'/')}（${items.length} 件）</span><span style="color:var(--success-text)">預計賺 ${fmt(totalEarn)}</span></div>
      ${items.map(r=>`<div class="rec-card">
        <div class="rec-header">
          <div style="flex:1">
            <div class="rec-name">${r.name} <span class="badge badge-type">${r.type}</span>${r.hasAI?'<span class="badge badge-ai" style="margin-left:4px">AI</span>':''}</div>
            <div class="rec-meta">${r.mats||'無材料記錄'}<br>成本 ${fmt(r.cost)}</div>
          </div>
          <div class="rec-right">
            <div class="rec-price">${fmt(r.price)}</div>
            <div class="rec-earn">可賺 ${fmt(r.earn)}</div>
            <button class="del-btn" style="margin-left:auto;margin-top:6px" onclick="delRecord(${r.id})"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        ${r.aiSummary?`<div class="rec-ai-preview"><i class="ti ti-robot" style="font-size:12px"></i> ${r.aiSummary}</div>`:''}
      </div>`).join('')}
    </div>`;
  }).join('');
}

function delRecord(id){records=records.filter(r=>r.id!==id);localStorage.setItem('kp3-records',JSON.stringify(records));renderRecords();}

renderYarns();recalc();
</script>
